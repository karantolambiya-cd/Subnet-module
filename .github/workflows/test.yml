name: Generate Terraform Docs

on:
  push:
    branches: [ "master" ]
  pull_request:

permissions: 
  contents: write  

jobs:
  docs:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ✅ force new runtime

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4   # still ok for now

      - name: Generate README with terraform-docs
        uses: terraform-docs/gh-actions@v1.4.1   # ✅ update version
        with:
          working-dir: .
          output-file: README.md
          output-method: inject
          git-push: true
